services:
  # Unified MindSync Service (Node.js + Python)
  - type: web
    name: mindsync-unified-backend
    env: docker
    rootDir: backend
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # Set this in Render Dashboard
      - key: AI_SERVICE_URL
        value: http://localhost:8000
      - key: START_AI_SERVICE
        value: "true"

  # React Frontend (Static Site)
  - type: static
    name: mindsync-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: mindsync-unified-backend
          type: web
          property: host
      - key: VITE_VAPI_PUBLIC_KEY
        sync: false
      - key: VITE_VAPI_ASSISTANT_ID
        sync: false
